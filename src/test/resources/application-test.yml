spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: false
  docker:
    compose:
      enabled: false

app:
  jwt:
    secret: dGVzdHNlY3JldGtleWZvcmludGVncmF0aW9udGVzdHN0aGF0aXNsb25nZW5vdWdoZm9yam9zZTUxMg==
    expiration: 3600000
    refresh-expiration: 86400000
  cors:
    allowed-origins: http://localhost:3000

logging:
  level:
    org.hibernate.SQL: WARN
    com.uz.taxi: INFO