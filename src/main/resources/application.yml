spring:
  docker:
    compose:
      enabled: false

  application:
    name: samarkand-tashkent

  datasource:
    url: jdbc:postgresql://localhost:5433/taxi_db
    username: taxi_user
    password: taxi_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

logging:
  level:
    uz.taxi: DEBUG
    org.springframework.security: DEBUG
